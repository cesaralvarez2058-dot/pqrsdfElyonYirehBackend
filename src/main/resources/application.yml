spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    # Limitar pool de conexiones para Supabase free tier (Transaction Mode - puerto 6543)
    hikari:
      maximum-pool-size: 3        # Máximo 3 conexiones simultáneas
      minimum-idle: 1             # Mínimo 1 conexión en reposo
      connection-timeout: 30000   # 30 segundos para obtener conexión
      idle-timeout: 600000        # 10 minutos antes de cerrar conexión inactiva
      max-lifetime: 1800000       # 30 minutos de vida máxima por conexión

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        # Dialecto explícito para PostgreSQL — evita error "Unable to determine Dialect"
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:auxiliarsistemas@elyonyireh.edu.co}
    password: ${MAIL_PASSWORD:baup npsf velf fqzm}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000

# Email del Administrador del sistema
pqrsdf:
  admin-email: ${ADMIN_EMAIL:auxiliarsistemas@elyonyireh.edu.co}

server:
  port: 8080 # Puerto de backend

# Configuración para subida de archivos grandes (evidencias)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

# Configuración S3 eliminada. Archivos se guardarán localmente

# Configuración de Logs (SLF4J / Logback)
logging:
  level:
    root: INFO
    com.elyonyireh: DEBUG # Captura todo detalle en tus paquetes
  file:
    name: logs/backend-errores.log # Nombre y ruta del archivo
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
