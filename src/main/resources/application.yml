spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update # Crea/actualiza las tablas automáticamente en base a tus @Entity
    show-sql: true # Muestra las consultas SQL en la consola (útil para desarrollo)

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:auxiliarsistemas@elyonyireh.edu.co}
    password: ${MAIL_PASSWORD:baup npsf velf fqzm}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Email del Administrador del sistema
pqrsdf:
  admin-email: ${ADMIN_EMAIL:auxiliarsistemas@elyonyireh.edu.co}

server:
  port: 8080 # Puerto de backend

# Configuración para subida de archivos grandes (evidencias)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

# Configuración S3 eliminada. Archivos se guardarán localmente

# Configuración de Logs (SLF4J / Logback)
logging:
  level:
    root: INFO
    com.elyonyireh: DEBUG # Captura todo detalle en tus paquetes
  file:
    name: logs/backend-errores.log # Nombre y ruta del archivo
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
